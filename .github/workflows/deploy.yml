name: Deploy to Firebase

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend (optional if you use a bundler)
        run: |
          cd frontend
          npm run build || echo "No build script, skipping"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools


      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase deploy --only hosting --project ${{ secrets.FIREBASE_PROJECT }} --token "$FIREBASE_TOKEN"

      - name: Deploy FastAPI to Cloud Run (optional)
        if: env.FASTAPI_DEPLOY == 'true'
        env:
          GCP_PROJECT: ${{ secrets.GCLOUD_PROJECT }}
          GCP_REGION: ${{ secrets.GCLOUD_REGION }}
          FASTAPI_API_KEY: ${{ secrets.FASTAPI_API_KEY }}
        run: |
          echo "Deploying FastAPI to Cloud Run..."
          # Assuming you have Dockerfile in api/ directory
          cd api
          gcloud auth configure-docker
          docker build -t gcr.io/$GCP_PROJECT/ekg-backend:latest .
          docker push gcr.io/$GCP_PROJECT/ekg-backend:latest
          gcloud run deploy ekg-backend \
            --image gcr.io/$GCP_PROJECT/ekg-backend:latest \
            --region $GCP_REGION \
            --platform managed \
            --allow-unauthenticated
