name: Deploy EKG Multi-Agente

on:
  push:
    branches: [ main ]

jobs:
  # ──────────────────────────────────────────────────
  # JOB 1: Deploy Frontend → Firebase Hosting
  # ──────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Firebase Hosting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend (si existe script de build)
        run: |
          cd frontend
          npm run build 2>/dev/null || echo "No build script found, deploying static files directly"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase deploy --only hosting \
            --project ${{ secrets.FIREBASE_PROJECT }} \
            --token "$FIREBASE_TOKEN"

  # ──────────────────────────────────────────────────
  # JOB 2: Deploy Backend → Google Cloud Run
  # GCP_SA_KEY: JSON del service account en Base64
  #   Generar con: base64 -w0 service-account.json
  # ──────────────────────────────────────────────────
  deploy-backend:
    name: Deploy FastAPI Backend to Cloud Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        env:
          GCP_SA_KEY_B64: ${{ secrets.GCP_SA_KEY }}
          GCLOUD_PROJECT: ${{ secrets.GCLOUD_PROJECT }}
        run: |
          echo "$GCP_SA_KEY_B64" | base64 --decode > /tmp/gcp_key.json
          gcloud auth activate-service-account \
            --key-file=/tmp/gcp_key.json \
            --project="$GCLOUD_PROJECT"
          gcloud config set project "$GCLOUD_PROJECT"
          gcloud auth list

      - name: Configure Docker for Artifact Registry
        env:
          GCLOUD_REGION: ${{ secrets.GCLOUD_REGION }}
        run: |
          gcloud auth configure-docker "${GCLOUD_REGION}-docker.pkg.dev" --quiet

      - name: Build and push Docker image
        env:
          GCP_PROJECT: ${{ secrets.GCLOUD_PROJECT }}
          GCP_REGION:  ${{ secrets.GCLOUD_REGION }}
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/ekg/ekg-backend:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        env:
          GCP_PROJECT: ${{ secrets.GCLOUD_PROJECT }}
          GCP_REGION:  ${{ secrets.GCLOUD_REGION }}
        run: |
          gcloud run deploy ekg-backend \
            --image "$IMAGE" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT" \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --timeout 120 \
            --set-env-vars "OPENAI_API_BASE=https://openrouter.ai/api/v1,MODEL_NAME=${{ secrets.MODEL_NAME }},OPENAI_API_KEY=${{ secrets.MODEL_API_KEY }},ALLOWED_ORIGINS=https://${{ secrets.FIREBASE_PROJECT }}.web.app,https://${{ secrets.FIREBASE_PROJECT }}.firebaseapp.com"

      - name: Cleanup credentials
        if: always()
        run: rm -f /tmp/gcp_key.json
