name: Deploy EKG Multi-Agente

on:
  push:
    branches: [ main ]

jobs:
  # ──────────────────────────────────────────────────
  # JOB 1: Deploy Frontend → Firebase Hosting
  # ──────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend to Firebase Hosting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      - name: Build frontend
        run: |
          cd frontend
          npm run build 2>/dev/null || echo "No build script, deploying static files"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          firebase deploy --only hosting \
            --project ${{ secrets.FIREBASE_PROJECT }} \
            --token "$FIREBASE_TOKEN"

  # ──────────────────────────────────────────────────
  # JOB 2: Deploy Backend → Google Cloud Run
  # GCP_SA_KEY: Compact JSON string (NOT base64)
  # ──────────────────────────────────────────────────
  deploy-backend:
    name: Deploy FastAPI Backend to Cloud Run
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCLOUD_PROJECT }}

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.GCLOUD_REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        env:
          GCP_PROJECT: ${{ secrets.GCLOUD_PROJECT }}
          GCP_REGION:  ${{ secrets.GCLOUD_REGION }}
        run: |
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/ekg/ekg-backend:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        env:
          GCP_PROJECT: ${{ secrets.GCLOUD_PROJECT }}
          GCP_REGION:  ${{ secrets.GCLOUD_REGION }}
          MODEL_NAME:  ${{ secrets.MODEL_NAME }}
          MODEL_API_KEY: ${{ secrets.MODEL_API_KEY }}
          FIREBASE_PROJECT: ${{ secrets.FIREBASE_PROJECT }}
        run: |
          # Use ^|^ as separator so commas inside values (ALLOWED_ORIGINS) are preserved
          gcloud run deploy ekg-backend \
            --image "$IMAGE" \
            --region "$GCP_REGION" \
            --project "$GCP_PROJECT" \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --timeout 120 \
            --update-env-vars "^|^OPENAI_API_BASE=https://openrouter.ai/api/v1|MODEL_NAME=${MODEL_NAME}|OPENAI_API_KEY=${MODEL_API_KEY}|ALLOWED_ORIGINS=https://${FIREBASE_PROJECT}.web.app,https://${FIREBASE_PROJECT}.firebaseapp.com"
